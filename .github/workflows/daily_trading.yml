# Ejecución diaria del bot de trading.
#
# DESACTIVADO: La ejecución automática se ha movido a un servidor
# Hetzner (Europa) para poder operar en live sin geo-bloqueo de Binance.
# Se mantiene workflow_dispatch para poder lanzarlo manualmente si se necesita.
#
# Los secrets de Binance, Mailjet y email se configuran en
# Settings > Secrets and variables > Actions del repositorio.

name: Daily Trading Bot

on:
  # schedule:
  #   - cron: "0 7 * * *"
  #   - cron: "0 19 * * *"
  workflow_dispatch:
    # Permite ejecución manual desde la UI de GitHub

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Download saved model (if exists)
        uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ github.sha }}
          restore-keys: |
            model-

      - name: Run trading bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_API_SECRET: ${{ secrets.MAILJET_API_SECRET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TRADING_MODE: ${{ secrets.TRADING_MODE || 'paper' }}
        run: python -m src.main

      - name: Save model after run
        uses: actions/cache/save@v4
        with:
          path: models/
          key: model-${{ github.sha }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
