# Re-entrenamiento semanal del modelo (domingos a las 06:00 UTC).
#
# Se ejecuta 1 hora antes del trading diario para que el modelo
# esté fresco cuando el bot opere a las 07:00.

name: Weekly Model Retrain

on:
  schedule:
    # Domingos a las 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Test data source connectivity
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import requests, json

          sources = {
              "Binance API": "https://api.binance.com/api/v3/ping",
              "Binance API1": "https://api1.binance.com/api/v3/ping",
              "Binance Data": "https://data-api.binance.vision/api/v3/ping",
              "CryptoCompare": "https://min-api.cryptocompare.com/data/v2/histohour?fsym=BTC&tsym=USD&limit=1",
              "CoinGecko": "https://api.coingecko.com/api/v3/ping",
              "Yahoo Finance": "https://query1.finance.yahoo.com/v8/finance/chart/BTC-USD?interval=1h&range=1d",
              "Binance Vision CSV": "https://data.binance.vision/data/spot/daily/klines/BTCUSDT/1h/BTCUSDT-1h-2026-04-01.zip",
              "Google": "https://www.google.com",
              "PyPI": "https://pypi.org/simple/",
          }

          results = {}
          for name, url in sources.items():
              try:
                  r = requests.get(url, timeout=15, headers={"User-Agent": "Mozilla/5.0"})
                  status = f"OK (status={r.status_code}, size={len(r.content)})"
                  results[name] = True
              except Exception as e:
                  status = f"FAIL: {type(e).__name__}: {e}"
                  results[name] = False
              print(f"  {name}: {status}")

          working = [k for k, v in results.items() if v]
          print(f"\nWorking sources: {working or 'NONE'}")
          PYEOF

      - name: Install yfinance fallback
        run: pip install yfinance

      - name: Train model
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python -m src.main train 2>&1 | tee training_output.txt

      - name: Save trained model
        uses: actions/cache/save@v4
        with:
          path: models/
          key: model-retrain-${{ github.run_number }}

      - name: Upload training logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
